<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🛒 Carrinho — MatjSMP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      text-align: center;
      min-height: 100vh;
    }

    header {
      padding: 2rem 1rem;
    }

    header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    header p {
      color: var(--muted);
    }

    main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.5rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .cart-item h3 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .cart-item p {
      margin: 0;
      color: var(--text);
    }

    .quantity {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .quantity input {
      width: 50px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid #555;
      background: #222;
      color: var(--text);
    }

    .cart-footer {
      background: var(--card);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      text-align: right;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .cart-footer h2 {
      margin: 0;
      color: var(--accent);
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn-pay {
      background: var(--danger);
      color: #fff;
    }

    .btn-pay:hover {
      background: #7f1d1d;
    }

    .btn-back {
      background: var(--accent);
      color: #022c22;
      margin-top: 1rem;
    }

    .btn-back:hover {
      background: var(--accent-dark);
    }

    #maintenance-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
      z-index: 999;
    }

    #maintenance-msg button {
      margin-top: 1rem;
      padding: 0.5rem 1.2rem;
      background: #b91c1c;
      color: #fff;
      border-radius: 8px;
    }

  </style>
</head>
<body>

  <header>
    <h1>🛒 Carrinho</h1>
    <p>Itens adicionados da loja MatjSMP</p>
  </header>

  <main id="cart-container">
    <!-- Itens do carrinho serão adicionados via JS -->
  </main>

  <div class="cart-footer">
    <h2>Total: $<span id="total">0</span></h2>
    <button class="btn-pay" onclick="proceedPayment()">Prosseguir para pagamento</button>
    <br>
    <button class="btn-back" onclick="goBack()">← Voltar para Loja</button>
  </div>

  <div id="maintenance-msg">
    <h2>⚠️ Loja em manutenção</h2>
    <p>O sistema de pagamento está temporariamente indisponível. Tente novamente mais tarde.</p>
    <button class="btn-back" onclick="goBack()">OK</button>
  </div>

  <script>
    // Ler itens do localStorage
    let cart = JSON.parse(localStorage.getItem('matjsmp-cart')) || [];

    function renderCart() {
      const container = document.getElementById('cart-container');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = '<p>Seu carrinho está vazio.</p>';
        document.getElementById('total').textContent = '0';
        return;
      }

      cart.forEach((item, index) => {
        total += item.price * item.quantity;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <div>
            <h3>${item.name}</h3>
            <p>Preço unitário: $${item.price}</p>
          </div>
          <div class="quantity">
            <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${index}, this.value)">
          </div>
        `;
        container.appendChild(div);
      });

      document.getElementById('total').textContent = total.toFixed(2);
    }

    function updateQuantity(index, value) {
      cart[index].quantity = parseInt(value);
      localStorage.setItem('matjsmp-cart', JSON.stringify(cart));
      renderCart();
    }

    function proceedPayment() {
      document.getElementById('maintenance-msg').style.display = 'flex';
    }

    function closeMaintenance() {
      document.getElementById('maintenance-msg').style.display = 'none';
    }

    function goBack() {
      window.location.href = 'loja.html';
    }

    renderCart();
  </script>
</body>
</html>
