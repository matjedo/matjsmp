<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>🌍 MatjSMP — Servidor Minecraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      text-align: center;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(2,6,23,.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .8rem 1.5rem;
      z-index: 1000;
    }

    nav strong {
      color: var(--accent);
      font-size: 1.1rem;
    }

    nav .links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    nav button {
      background: none;
      border: none;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    nav button:hover {
      color: var(--accent);
    }

    .cart {
      position: relative;
      font-size: 1.2rem;
    }

    .cart span {
      position: absolute;
      top: -6px;
      right: -10px;
      background: var(--accent);
      color: #022c22;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: .7rem;
      font-weight: 700;
    }

    header {
      padding: 7rem 1rem 3rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto 4rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    section {
      background: rgba(17,24,39,.85);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
      text-align: left;
    }

    section h2 {
      color: var(--accent);
    }

    .store button {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none;
      padding: .5rem 1rem;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      margin-top: .5rem;
    }

    /* ===== MODAL CARRINHO ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--card);
      padding: 1.5rem;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      text-align: left;
    }

    footer {
      background: #020617;
      color: var(--muted);
      padding: 1rem;
    }
  </style>
</head>
<body>

<nav>
  <strong>MatjSMP</strong>
  <div class="links">
    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goStore()">🛒 Loja</button>
    <button class="cart" onclick="openCart()">🧺<span id="cartCount">0</span></button>
  </div>
</nav>

<header id="home">
  <h1>🌍 MatjSMP</h1>
  <p>Servidor Survival • Comunidade • Eventos</p>
</header>

<main id="store">
  <section class="store">
    <h2>VIP Ouro</h2>
    <p>Acesso a kits especiais</p>
    <button onclick="addToCart('VIP Ouro')">Adicionar ao carrinho</button>
  </section>

  <section class="store">
    <h2>Kit Netherite</h2>
    <p>Itens fortes para survival</p>
    <button onclick="addToCart('Kit Netherite')">Adicionar ao carrinho</button>
  </section>
</main>

<div class="modal" id="cartModal">
  <div class="modal-content">
    <h2>🧺 Carrinho</h2>
    <ul id="cartItems"></ul>
    <button onclick="closeCart()">Fechar</button>
  </div>
</div>

<footer>
  2026 MatjSMP • matjsmp@gmail.com
</footer>

<script>
  let cart = [];

  function addToCart(item) {
    cart.push(item);
    updateCart();
  }

  function updateCart() {
    document.getElementById('cartCount').innerText = cart.length;
    const list = document.getElementById('cartItems');
    list.innerHTML = '';
    cart.forEach(i => {
      const li = document.createElement('li');
      li.textContent = i;
      list.appendChild(li);
    });
  }

  function openCart() {
    document.getElementById('cartModal').style.display = 'flex';
  }

  function closeCart() {
    document.getElementById('cartModal').style.display = 'none';
  }

  function goHome() {
    document.getElementById('home').scrollIntoView({behavior:'smooth'});
  }

  function goStore() {
    document.getElementById('store').scrollIntoView({behavior:'smooth'});
  }
</script>

</body>
</html>
