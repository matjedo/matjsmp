<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MatjSMP • Loja</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --danger:#7f1d1d;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

nav {
  display:flex;
  justify-content:space-between;
  padding:1rem;
  background:#020617;
}

nav button {
  background:none;
  border:none;
  color:var(--text);
  cursor:pointer;
  font-weight:bold;
}

nav button:hover {
  color:var(--accent);
}

.page {
  display:none;
  padding:2rem;
}

.page.active {
  display:block;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
}

.card {
  background:var(--card);
  padding:1rem;
  border-radius:12px;
}

.card button {
  margin-top:.5rem;
  padding:.4rem 1rem;
  border:none;
  border-radius:999px;
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

.card button.disabled {
  background:#374151;
  cursor:not-allowed;
}

.cart-item {
  display:flex;
  justify-content:space-between;
}

.skin {
  width:64px;
  height:64px;
  border-radius:8px;
  margin-top:.5rem;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:var(--danger);
  padding:1.5rem;
  border-radius:12px;
  max-width:300px;
  text-align:center;
}

.modal-content button {
  margin-top:1rem;
  padding:.4rem 1rem;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<nav>
  <strong>MatjSMP</strong>
  <div>
    <button onclick="openPage('home')">Home</button>
    <button onclick="openPage('store')">Loja</button>
    <button onclick="openPage('cart')">Carrinho</button>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="home">
  <h1>📰 Notícias</h1>
  <p>✅ Novo IP</p>
  <p>🎉 Eventos em breve</p>
</div>

<!-- LOJA -->
<div class="page" id="store">
  <h1>🛒 Loja</h1>
  <div class="cards">
    <div class="card">
      <h3>Beta</h3>
      <button onclick="addItem(this,'Beta')">Adicionar</button>
    </div>
    <div class="card">
      <h3>Diamante</h3>
      <button onclick="addItem(this,'Diamante')">Adicionar</button>
    </div>
    <div class="card">
      <h3>VIP</h3>
      <button onclick="addItem(this,'VIP')">Adicionar</button>
    </div>
    <div class="card">
      <h3>MATJ</h3>
      <button onclick="addItem(this,'MATJ')">Adicionar</button>
    </div>
  </div>
</div>

<!-- CARRINHO -->
<div class="page" id="cart">
  <h1>🧺 Carrinho</h1>

  <div id="cartList"></div>

  <h3>Nick do Minecraft</h3>
  <input id="nick" placeholder="Seu nick" oninput="updateSkin()">

  <br>
  <img id="skin" class="skin">

  <br><br>
  <button onclick="pay()">Prosseguir com pagamento</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>🚧 Manutenção</h3>
    <p>O sistema de pagamento está temporariamente indisponível.</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
let cart = {};

function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addItem(btn,item){
  cart[item]=(cart[item]||0)+1;
  btn.classList.add('disabled');
  btn.disabled=true;
  renderCart();
}

function renderCart(){
  const div=document.getElementById('cartList');
  div.innerHTML='';
  Object.keys(cart).forEach(i=>{
    const d=document.createElement('div');
    d.className='cart-item';
    d.innerHTML=`<span>${i}</span><span>x${cart[i]}</span>`;
    div.appendChild(d);
  });
}

function updateSkin(){
  const nick=document.getElementById('nick').value;
  if(nick.length>0){
    document.getElementById('skin').src=`https://mc-heads.net/avatar/${nick}`;
  }
}

function pay(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
